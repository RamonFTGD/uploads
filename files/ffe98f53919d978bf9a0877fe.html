<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>🍔 Camioneta de Hamburguesas - 3D Básico</title>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            font-family: 'Arial', sans-serif;
        }
        #info {
            position: absolute;
            top: 20px;
            left: 20px;
            background: rgba(0,0,0,0.7);
            color: white;
            padding: 12px 20px;
            border-radius: 30px;
            backdrop-filter: blur(5px);
            pointer-events: none;
            z-index: 10;
            box-shadow: 0 4px 15px rgba(0,0,0,0.3);
            border-left: 5px solid #ffaa00;
        }
        #score {
            position: absolute;
            top: 20px;
            right: 20px;
            background: rgba(0,0,0,0.7);
            color: #ffdd44;
            padding: 12px 25px;
            border-radius: 30px;
            font-size: 24px;
            font-weight: bold;
            backdrop-filter: blur(5px);
            pointer-events: none;
            z-index: 10;
            box-shadow: 0 4px 15px rgba(0,0,0,0.3);
            border-right: 5px solid #ffaa00;
        }
        #controls {
            position: absolute;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(20,20,20,0.8);
            color: white;
            padding: 12px 25px;
            border-radius: 40px;
            backdrop-filter: blur(5px);
            display: flex;
            gap: 30px;
            z-index: 10;
            pointer-events: none;
            box-shadow: 0 4px 10px rgba(0,0,0,0.5);
            border: 1px solid #ffaa00;
        }
        .key {
            background: #333;
            border: 1px solid #ffaa00;
            color: #ffaa00;
            padding: 5px 12px;
            border-radius: 20px;
            font-weight: bold;
            margin: 0 5px;
        }
        #sell-btn-container {
            position: absolute;
            bottom: 100px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 20;
            pointer-events: none;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        #sell-btn {
            pointer-events: auto;
            background: #ff5500;
            color: white;
            border: none;
            padding: 16px 40px;
            font-size: 28px;
            font-weight: bold;
            border-radius: 60px;
            box-shadow: 0 8px 0 #aa3300, 0 10px 20px rgba(0,0,0,0.3);
            cursor: pointer;
            transition: 0.05s linear;
            border: 2px solid #ffcc00;
            letter-spacing: 2px;
            text-shadow: 1px 1px 2px black;
        }
        #sell-btn:active {
            transform: translateY(6px);
            box-shadow: 0 2px 0 #aa3300, 0 5px 12px rgba(0,0,0,0.3);
        }
        #sell-btn:disabled {
            opacity: 0.5;
            transform: translateY(4px);
            box-shadow: 0 4px 0 #773300, 0 5px 10px rgba(0,0,0,0.2);
            pointer-events: none;
            background: #888;
            border-color: #aaa;
        }
        #message {
            position: absolute;
            bottom: 180px;
            left: 50%;
            transform: translateX(-50%);
            color: white;
            background: rgba(0,0,0,0.6);
            padding: 8px 20px;
            border-radius: 30px;
            font-size: 18px;
            backdrop-filter: blur(5px);
            z-index: 15;
            pointer-events: none;
            white-space: nowrap;
        }
        #cooldown-bar {
            position: absolute;
            bottom: 160px;
            left: 50%;
            transform: translateX(-50%);
            width: 200px;
            height: 8px;
            background: #333;
            border-radius: 10px;
            overflow: hidden;
            z-index: 15;
            box-shadow: 0 0 10px rgba(0,0,0,0.5);
        }
        #cooldown-fill {
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, #ffaa00, #ffdd55);
            border-radius: 10px;
            transition: width 0.1s;
        }
    </style>
</head>
<body>
    <div id="info">🚚🍔 <strong>BURGER TRUCK</strong> | ¡Vende hamburguesas!</div>
    <div id="score">💰 $<span id="money-value">0</span></div>
    <div id="controls">
        <span><span class="key">WASD</span> Mover</span>
        <span><span class="key">🖱️</span> Arrastrar para mirar</span>
        <span><span class="key">ESPACIO</span> Vender</span>
    </div>
    <div id="message">👋 ¡Clientes cerca! Presiona VENDER</div>
    <div id="cooldown-bar">
        <div id="cooldown-fill"></div>
    </div>
    <div id="sell-btn-container">
        <button id="sell-btn">🍔 VENDER 🍔</button>
    </div>

    <!-- Importamos Three.js y complementos -->
    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.128.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.128.0/examples/jsm/"
            }
        }
    </script>

    <script type="module">
        import * as THREE from 'three';
        import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
        import { CSS2DRenderer, CSS2DObject } from 'three/addons/renderers/CSS2DRenderer.js';

        // --- Configuración inicial ---
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0xaaccff); // Cielo claro
        
        // Cámara en tercera persona (vista desde atrás de la camioneta)
        const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.set(8, 6, 12);
        
        // Renderers
        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.shadowMap.enabled = true;
        renderer.shadowMap.type = THREE.PCFSoftShadowMap;
        document.body.appendChild(renderer.domElement);

        const labelRenderer = new CSS2DRenderer();
        labelRenderer.setSize(window.innerWidth, window.innerHeight);
        labelRenderer.domElement.style.position = 'absolute';
        labelRenderer.domElement.style.top = '0px';
        labelRenderer.domElement.style.left = '0px';
        labelRenderer.domElement.style.pointerEvents = 'none';  // Permite click en botones
        document.body.appendChild(labelRenderer.domElement);

        // Controles orbitales (pero limitados para que sea más fácil)
        const controls = new OrbitControls(camera, renderer.domElement);
        controls.enableDamping = true;
        controls.dampingFactor = 0.05;
        controls.autoRotate = false;
        controls.enableZoom = true;
        controls.target.set(0, 1, 0);
        controls.maxPolarAngle = Math.PI / 2.3;
        
        // --- Luces ---
        // Luz ambiental
        scene.add(new THREE.AmbientLight(0x404060, 0.6));
        // Sol
        const sunLight = new THREE.DirectionalLight(0xfff5d1, 1.2);
        sunLight.position.set(10, 20, 5);
        sunLight.castShadow = true;
        sunLight.receiveShadow = true;
        sunLight.shadow.mapSize.width = 1024;
        sunLight.shadow.mapSize.height = 1024;
        const d = 15;
        sunLight.shadow.camera.left = -d;
        sunLight.shadow.camera.right = d;
        sunLight.shadow.camera.top = d;
        sunLight.shadow.camera.bottom = -d;
        sunLight.shadow.camera.near = 1;
        sunLight.shadow.camera.far = 40;
        sunLight.shadow.bias = -0.0005;
        scene.add(sunLight);
        
        // Luz de relleno
        const fillLight = new THREE.PointLight(0x4466ff, 0.5);
        fillLight.position.set(-5, 5, 10);
        scene.add(fillLight);
        
        // Luces del puesto
        const truckLight = new THREE.PointLight(0xffaa00, 0.8);
        truckLight.position.set(0, 3, 2);
        scene.add(truckLight);
        
        // --- Suelo y entorno ---
        // Suelo de césped
        const groundGeometry = new THREE.CircleGeometry(30, 32);
        const groundMaterial = new THREE.MeshStandardMaterial({ color: 0x3d9e3d, roughness: 0.8, side: THREE.DoubleSide });
        const ground = new THREE.Mesh(groundGeometry, groundMaterial);
        ground.rotation.x = -Math.PI / 2;
        ground.position.y = -0.01;
        ground.receiveShadow = true;
        scene.add(ground);
        
        // Rejilla decorativa
        const gridHelper = new THREE.GridHelper(60, 20, 0x88aa88, 0x445544);
        gridHelper.position.y = 0;
        scene.add(gridHelper);
        
        // Algunos árboles simples para decorar
        function createTree(x, z, size = 1.0) {
            const group = new THREE.Group();
            const trunkMat = new THREE.MeshStandardMaterial({ color: 0x8B5E3C, roughness: 0.9 });
            const leafMat = new THREE.MeshStandardMaterial({ color: 0x2E7D32, roughness: 0.6 });
            
            const trunk = new THREE.Mesh(new THREE.CylinderGeometry(0.4 * size, 0.5 * size, 2 * size), trunkMat);
            trunk.position.y = 1 * size;
            trunk.castShadow = true;
            trunk.receiveShadow = true;
            group.add(trunk);
            
            const leaves1 = new THREE.Mesh(new THREE.ConeGeometry(1.2 * size, 1.8 * size, 8), leafMat);
            leaves1.position.y = 2.2 * size;
            leaves1.castShadow = true;
            leaves1.receiveShadow = true;
            group.add(leaves1);
            
            const leaves2 = new THREE.Mesh(new THREE.ConeGeometry(0.9 * size, 1.4 * size, 8), leafMat);
            leaves2.position.y = 3.2 * size;
            leaves2.castShadow = true;
            leaves2.receiveShadow = true;
            group.add(leaves2);
            
            group.position.set(x, 0, z);
            return group;
        }

        scene.add(createTree(-8, -5, 1.2));
        scene.add(createTree(9, 4, 1.0));
        scene.add(createTree(-7, 8, 1.1));
        scene.add(createTree(10, -7, 1.3));
        scene.add(createTree(-10, -8, 1.0));
        
        // Rocas decorativas
        const rockMat = new THREE.MeshStandardMaterial({ color: 0x888888, roughness: 0.9 });
        for (let i = 0; i < 5; i++) {
            const rock = new THREE.Mesh(new THREE.DodecahedronGeometry(0.4 + Math.random()*0.3), rockMat);
            rock.position.set(-5 + i*3, 0.2, -9);
            rock.rotation.y = Math.random();
            rock.receiveShadow = true;
            rock.castShadow = true;
            scene.add(rock);
        }
        
        // --- Construcción de la Camioneta (Food Truck) ---
        const truckGroup = new THREE.Group();
        truckGroup.position.set(0, 0, 0);
        
        // Carrocería base (camioneta)
        const bodyMat = new THREE.MeshStandardMaterial({ color: 0xff6600, roughness: 0.4, emissive: new THREE.Color(0x331100) });
        const cabinMat = new THREE.MeshStandardMaterial({ color: 0xdd4422, roughness: 0.5 });
        const detailMat = new THREE.MeshStandardMaterial({ color: 0xcccccc, roughness: 0.3, metalness: 0.6 });
        const windowMat = new THREE.MeshStandardMaterial({ color: 0x88aacc, roughness: 0.1, emissive: new THREE.Color(0x112233), transparent: true, opacity: 0.7 });
        const wheelMat = new THREE.MeshStandardMaterial({ color: 0x222222, roughness: 0.8 });
        const rimMat = new THREE.MeshStandardMaterial({ color: 0xcccccc, roughness: 0.3, metalness: 0.8 });
        
        // Chasis
        const chassis = new THREE.Mesh(new THREE.BoxGeometry(4.5, 1.0, 2.5), bodyMat);
        chassis.position.y = 0.8;
        chassis.castShadow = true;
        chassis.receiveShadow = true;
        truckGroup.add(chassis);
        
        // Cabina (parte delantera)
        const cabin = new THREE.Mesh(new THREE.BoxGeometry(2.2, 1.4, 2.2), cabinMat);
        cabin.position.set(-1.5, 1.5, 0);
        cabin.castShadow = true;
        cabin.receiveShadow = true;
        truckGroup.add(cabin);
        
        // Parabrisas
        const windshield = new THREE.Mesh(new THREE.BoxGeometry(1.8, 0.8, 1.9), windowMat);
        windshield.position.set(-1.5, 1.7, 0.1);
        windshield.castShadow = true;
        truckGroup.add(windshield);
        
        // Ventanas laterales
        const sideWindowL = new THREE.Mesh(new THREE.BoxGeometry(0.2, 0.8, 1.2), windowMat);
        sideWindowL.position.set(-1.5, 1.7, -1.0);
        sideWindowL.castShadow = true;
        truckGroup.add(sideWindowL);
        const sideWindowR = sideWindowL.clone();
        sideWindowR.position.set(-1.5, 1.7, 1.0);
        truckGroup.add(sideWindowR);
        
        // Techo de la cabina
        const roof = new THREE.Mesh(new THREE.BoxGeometry(2.3, 0.1, 2.3), detailMat);
        roof.position.set(-1.5, 2.25, 0);
        roof.castShadow = true;
        roof.receiveShadow = true;
        truckGroup.add(roof);
        
        // Caja trasera (donde se preparan/venden hamburguesas)
        const cargo = new THREE.Mesh(new THREE.BoxGeometry(2.5, 1.8, 2.5), bodyMat);
        cargo.position.set(1.5, 1.5, 0);
        cargo.castShadow = true;
        cargo.receiveShadow = true;
        truckGroup.add(cargo);
        
        // Ventana de servicio lateral (abertura)
        const serviceWindow = new THREE.Mesh(new THREE.BoxGeometry(0.2, 1.0, 1.8), new THREE.MeshStandardMaterial({ color: 0x333333 }));
        serviceWindow.position.set(2.2, 1.6, 0);
        serviceWindow.castShadow = true;
        truckGroup.add(serviceWindow);
        
        // Toldo / sombrilla
        const awningMat = new THREE.MeshStandardMaterial({ color: 0xffaa00, side: THREE.DoubleSide });
        const awning = new THREE.Mesh(new THREE.CylinderGeometry(2.8, 2.8, 0.1, 8), awningMat);
        awning.position.set(1.5, 2.9, 0);
        awning.rotation.y = Math.PI/8;
        awning.castShadow = true;
        awning.receiveShadow = true;
        truckGroup.add(awning);
        
        // Detalles: parrilla, faros
        const grill = new THREE.Mesh(new THREE.BoxGeometry(0.2, 0.8, 1.5), new THREE.MeshStandardMaterial({ color: 0x555555, roughness: 0.2, metalness: 0.8 }));
        grill.position.set(-2.6, 1.2, 0);
        grill.castShadow = true;
        truckGroup.add(grill);
        
        const headlightMat = new THREE.MeshStandardMaterial({ color: 0xffeedd, emissive: new THREE.Color(0xffaa00) });
        const headlight1 = new THREE.Mesh(new THREE.SphereGeometry(0.2), headlightMat);
        headlight1.position.set(-2.7, 1.0, -0.8);
        truckGroup.add(headlight1);
        const headlight2 = headlight1.clone();
        headlight2.position.set(-2.7, 1.0, 0.8);
        truckGroup.add(headlight2);
        
        // Ruedas
        function createWheel(posX, posZ) {
            const wheelGroup = new THREE.Group();
            const tire = new THREE.Mesh(new THREE.CylinderGeometry(0.6, 0.6, 0.4, 24), wheelMat);
            tire.rotation.z = Math.PI/2;
            tire.castShadow = true;
            tire.receiveShadow = true;
            wheelGroup.add(tire);
            
            const rim = new THREE.Mesh(new THREE.CylinderGeometry(0.35, 0.35, 0.41, 8), rimMat);
            rim.rotation.z = Math.PI/2;
            rim.castShadow = true;
            wheelGroup.add(rim);
            
            wheelGroup.position.set(posX, 0.5, posZ);
            return wheelGroup;
        }
        
        truckGroup.add(createWheel(-1.8, -1.4));
        truckGroup.add(createWheel(-1.8, 1.4));
        truckGroup.add(createWheel(2.0, -1.4));
        truckGroup.add(createWheel(2.0, 1.4));
        
        // Hamburguesa decorativa sobre el mostrador (símbolo)
        const burgerGroup = new THREE.Group();
        const bunMat = new THREE.MeshStandardMaterial({ color: 0xe8b87a });
        const pattyMat = new THREE.MeshStandardMaterial({ color: 0x8B4513 });
        const lettuceMat = new THREE.MeshStandardMaterial({ color: 0x6B8E23 });
        
        const bottomBun = new THREE.Mesh(new THREE.CylinderGeometry(0.5, 0.5, 0.15, 8), bunMat);
        bottomBun.position.y = 0.1;
        bottomBun.castShadow = true;
        bottomBun.receiveShadow = true;
        burgerGroup.add(bottomBun);
        
        const patty = new THREE.Mesh(new THREE.CylinderGeometry(0.55, 0.55, 0.2, 8), pattyMat);
        patty.position.y = 0.3;
        patty.castShadow = true;
        patty.receiveShadow = true;
        burgerGroup.add(patty);
        
        const lettuce = new THREE.Mesh(new THREE.CylinderGeometry(0.6, 0.6, 0.05, 8), lettuceMat);
        lettuce.position.y = 0.45;
        lettuce.castShadow = true;
        burgerGroup.add(lettuce);
        
        const topBun = new THREE.Mesh(new THREE.SphereGeometry(0.5, 8, 4), bunMat);
        topBun.position.y = 0.6;
        topBun.scale.set(1, 0.4, 1);
        topBun.castShadow = true;
        burgerGroup.add(topBun);
        
        burgerGroup.position.set(2.2, 2.4, 0.8);
        burgerGroup.rotation.y = 0.3;
        truckGroup.add(burgerGroup);
        
        scene.add(truckGroup);

        // --- Clientes (NPCs simples) ---
        const customers = [];
        const customerPositions = [
            { x: 3.5, z: 2.8 },
            { x: -2.0, z: 4.5 },
            { x: -4.0, z: -3.0 },
            { x: 5.0, z: -2.5 }
        ];
        
        function createCustomer(pos, colorVariant = 0) {
            const group = new THREE.Group();
            
            // Cuerpo
            const bodyMat = new THREE.MeshStandardMaterial({ color: 0x3366cc, roughness: 0.7 });
            const body = new THREE.Mesh(new THREE.CylinderGeometry(0.4, 0.4, 1.2), bodyMat);
            body.position.y = 0.6;
            body.castShadow = true;
            body.receiveShadow = true;
            group.add(body);
            
            // Cabeza
            const headMat = new THREE.MeshStandardMaterial({ color: 0xffccaa });
            const head = new THREE.Mesh(new THREE.SphereGeometry(0.25), headMat);
            head.position.y = 1.3;
            head.castShadow = true;
            head.receiveShadow = true;
            group.add(head);
            
            // Ojos
            const eyeMat = new THREE.MeshStandardMaterial({ color: 0x000000 });
            const eye1 = new THREE.Mesh(new THREE.SphereGeometry(0.05), eyeMat);
            eye1.position.set(-0.1, 1.35, 0.22);
            group.add(eye1);
            const eye2 = eye1.clone();
            eye2.position.set(0.1, 1.35, 0.22);
            group.add(eye2);
            
            // Sombrero o detalle
            const hatMat = new THREE.MeshStandardMaterial({ color: 0xdd8844 });
            const hat = new THREE.Mesh(new THREE.CylinderGeometry(0.3, 0.3, 0.1, 6), hatMat);
            hat.position.y = 1.55;
            hat.castShadow = true;
            group.add(hat);
            
            group.position.set(pos.x, 0, pos.z);
            // Mirar hacia el camión aproximadamente
            group.lookAt(new THREE.Vector3(0, 1, 0));
            
            return group;
        }
        
        customerPositions.forEach((pos, i) => {
            const cust = createCustomer(pos);
            scene.add(cust);
            customers.push({
                mesh: cust,
                basePos: new THREE.Vector3(pos.x, 0, pos.z),
                satisfied: false,
                timer: 0
            });
        });
        
        // Etiquetas de clientes (CSS2DRenderer)
        const labelGroup = new THREE.Group();
        customers.forEach((cust, index) => {
            const div = document.createElement('div');
            div.textContent = '🍔😋';
            div.style.color = 'white';
            div.style.fontSize = '20px';
            div.style.fontWeight = 'bold';
